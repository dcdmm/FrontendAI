services:
  frontend:
    image: my-frontend:latest
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  backend:
    image: my-backend:latest
    build: 
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
