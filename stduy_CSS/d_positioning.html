<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>定位(position)</title>
    <style>
        .demo {
            margin-bottom: 40px;
            background: #f9f9f9;
            padding: 15px;
            border: 1px solid #ddd;
        }

        .relative-demo .box {
            width: 100px;
            height: 100px;
            margin: 5px;
        }

        .relative-demo .relative {
            position: relative;
            top: 50px;
            left: 20px;
        }

        .absolute-demo .parent {
            position: relative;
            width: 300px;
            height: 200px;
            background: #f39c12;
            border: 2px solid #e67e22;
        }

        .absolute-demo .box {
            background: #e74c3c;
            width: 100px;
            height: 100px;
        }

        .absolute-demo .absolute {
            position: absolute;
            top: 50px;
            left: 20px;
            background: #31cbbe;
            width: 60px;
            height: 30px;
        }

        .fixed-div {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: #e74c3c;
        }


        .zindex-demo {
            position: relative;
            height: 180px;
        }

        .zindex-demo .layer {
            position: absolute;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border: 2px solid rgba(0, 0, 0, 0.2);
        }

        .zindex-demo .layer1 {
            top: 10px;
            left: 10px;
            background: rgba(231, 76, 60, 0.9);
            z-index: 1;
        }

        .zindex-demo .layer2 {
            top: 40px;
            left: 60px;
            background: rgba(46, 204, 113, 0.9);
            z-index: 2;
        }

        .zindex-demo .layer3 {
            top: 70px;
            left: 110px;
            background: rgba(52, 152, 219, 0.9);
            z-index: 3;
        }
    </style>
</head>

<body>
    <!-- The element is positioned according to the normal flow of the document, and then offset relative to itself based on the values of top, right, bottom, and left. The offset does not affect the position of any other elements; -->
    <h2>relative(相对定位)</h2>
    <div class="demo relative-demo">
        <div class="box" style="background:#e74c3c;"></div>
        <div class="box relative" style="background:#2ecc71;"></div>
        <div class="box" style="background:#3498db;"></div>
    </div>

    <!-- The element is removed from the normal document flow, and no space is created for the element in the page layout. The element is positioned relative to its closest positioned ancestor (if any) or to the initial containing block. -->
    <h2>absolute(绝对定位)</h2>
    <div class="demo absolute-demo">
        <div class="parent">
            <div class="box"></div>
            <div class="absolute"></div>
        </div>
    </div>

    <!-- Let's now look at fixed positioning. This works in exactly the same way as absolute positioning, with one key difference: whereas absolute positioning fixes an element in place relative to its nearest positioned ancestor (the initial containing block if there isn't one), fixed positioning fixes an element in place relative to the visible portion of the viewport. This means that you can create useful UI items that are fixed in place, like persistent navigation menus that are always visible no matter how much the page scrolls. -->
    <h2>fixed(固定定位)</h2>
    <div class="fixed-div">固定</div>

    <h2>z-index(改变堆叠顺序)</h2>
    <div class="demo zindex-demo">
        <div class="layer layer1">z-index: 1</div>
        <div class="layer layer2">z-index: 2</div>
        <div class="layer layer3">z-index: 3</div>
    </div>
</body>

</html>
